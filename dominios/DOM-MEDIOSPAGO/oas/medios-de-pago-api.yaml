openapi: 3.0.3

info:
  title: "Medios de Pago API"
  description: "API de prueba para validar referenciamiento del yaml individual BC-cuenta-origen"
  version: "1.0.0"
  contact:
    name: "TEAM-HERMES"

servers:
  - url: "https://api.banco.com/mediospago"
    description: "Sandbox"

security:
  - oauth2: []

paths:
  /transferencias:
    post:
      summary: "Crear una transferencia"
      operationId: "crearTransferencia"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cuentaOrigen
                - monto
              properties:
                cuentaOrigen:
                  $ref: "../business-components/BC-MEDIOSPAGO-cuenta-origen-v1.yaml"
                monto:
                  type: number
                  example: 150000
      responses:
        '201':
          description: "Transferencia creada"
        '400':
          $ref: "#/components/responses/BadRequest"
        '401':
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: "https://auth.banco.com/token"
          scopes: {}

  responses:
    BadRequest:
      description: "Solicitud invalida"
    Unauthorized:
      description: "No autenticado"
