openapi: 3.0.3
info:
  title: Medios de Pago API
  description: API de prueba para validar referenciamiento del yaml individual BC-cuenta-origen
  version: 1.0.0
  contact:
    name: TEAM-HERMES
servers:
  - url: https://api.banco.com/mediospago
    description: Sandbox
security:
  - oauth2: []
paths:
  /transferencias:
    post:
      summary: Crear una transferencia
      operationId: crearTransferencia
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cuentaOrigen
                - monto
              properties:
                cuentaOrigen:
                  $ref: '#/components/schemas/BC-MEDIOSPAGO-cuenta-origen-v1'
                monto:
                  type: number
                  example: 150000
      responses:
        '201':
          description: Transferencia creada
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://auth.banco.com/token
          scopes: {}
  responses:
    BadRequest:
      description: Solicitud invalida
    Unauthorized:
      description: No autenticado
  schemas:
    BC-MEDIOSPAGO-cuenta-origen-v1:
      type: object
      description: Cuenta bancaria desde la cual se debitan los fondos en una operacion de Medios de Pago.
      required:
        - numeroCuenta
        - tipoCuenta
        - titular
        - documentoTitular
      properties:
        numeroCuenta:
          type: string
          description: Numero de cuenta bancaria origen, sin guiones ni espacios.
          example: '1234567890'
        tipoCuenta:
          type: string
          description: Tipo de cuenta. Ver CS-MEDIOSPAGO-tipo-cuenta.
          enum:
            - AHORROS
            - CORRIENTE
        titular:
          type: string
          description: Nombre completo del titular de la cuenta origen.
          example: Juan Perez Gomez
        documentoTitular:
          type: string
          description: Numero de documento de identidad del titular.
          example: '1020304050'
        entidadFinanciera:
          type: string
          description: Codigo de la entidad financiera, si la cuenta es interbancaria.
          example: '0001'
      x-canonical-metadata:
        component_id: BC-MEDIOSPAGO-cuenta-origen-v1
        source: custom
        branch_id: null
