# Yaml individual hermano de BC-MEDIOSPAGO-cuenta-origen-v1.md
# Mismo nombre base, misma carpeta (convencion "sibling").
# Este fragmento se ensambla por el pipeline de build dentro del
# OAS final del dominio DOM-MEDIOSPAGO; no se publica solo.

components:
  schemas:
    CuentaOrigen:
      type: object
      description: "Cuenta bancaria desde la cual se debitan los fondos en una operacion de Medios de Pago."
      required:
        - numeroCuenta
        - tipoCuenta
        - titular
        - documentoTitular
      properties:
        numeroCuenta:
          type: string
          description: "Numero de cuenta bancaria origen, sin guiones ni espacios."
          example: "1234567890"
        tipoCuenta:
          type: string
          description: "Tipo de cuenta. Ver CS-MEDIOSPAGO-tipo-cuenta."
          enum: ["AHORROS", "CORRIENTE"]
        titular:
          type: string
          description: "Nombre completo del titular de la cuenta origen."
          example: "Juan Perez Gomez"
        documentoTitular:
          type: string
          description: "Numero de documento de identidad del titular."
          example: "1020304050"
        entidadFinanciera:
          type: string
          description: "Codigo de la entidad financiera, si la cuenta es interbancaria."
          example: "0001"
      x-canonical-metadata:
        component_id: "BC-MEDIOSPAGO-cuenta-origen-v1"
        source: "custom"
        branch_id: null
