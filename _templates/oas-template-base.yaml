# ============================================================
# oas-template-base.yaml — V2
# ============================================================
# TEMPLATE BASE OAS 3.0 — Repositorio Canonico — V2
#
# Este archivo es el ESQUELETO que el pipeline de build usa como
# base estructural (info, servers, security, responses estandar)
# al generar el OAS de un dominio nuevo. El contenido de "paths" y
# "schemas" especifico de cada operacion NO se escribe a mano aqui
# -- se ENSAMBLA desde:
#   - Los yaml individuales de cada BC/MC/DT/CS (individual_oas_file)
#   - Los fragmentos ensamblados de cada MD (assembled_fragment_file)
#
# El resultado final autocontenido (sin $ref externos, requerido por
# IBM APIConnect) se publica en dominios/{DOM-XXX}/oas/dist/*.bundled.yaml
# usando una herramienta de bundling (ej. redocly bundle o
# swagger-cli bundle --dereference).
#
# Uso: copiar este archivo UNA VEZ al crear un dominio nuevo, para
# fijar info/servers/security/responses estandar. NO editar paths
# ni schemas aqui directamente -- eso se regenera por el build.
#
# Reemplazar todos los valores {{...}} antes de publicar.
#
# Convencion de oro: cada schema definido en el OAS final debe
# tener el bloque "x-canonical-metadata" que lo traza a su BC, MC
# o MD de origen en el repositorio (incluye "source" y, si aplica,
# "branch_id").
#
# ------------------------------------------------------------
# REGLAS DE LINTING REDOCLY QUE ESTE TEMPLATE RESUELVE POR DISEÑO
# ------------------------------------------------------------
# 1. "info-license": el Info Object DEBE contener el campo `license`.
#    -> Resuelto: bloque license obligatorio mas abajo, con valores
#       de placeholder a reemplazar ({{...}}), nunca a eliminar.
#
# 2. "operation-4xx-response": toda operacion DEBE declarar al menos
#    una respuesta 4XX.
#    -> Resuelto: cada operacion nueva DEBE incluir como minimo
#       '400': $ref: '#/components/responses/BadRequest'
#       (o el 4XX que corresponda de la lista ya definida abajo:
#       BadRequest/401/403/404). Ver bloque "EJEMPLO DE OPERACION"
#       mas abajo como plantilla obligatoria a copiar para cada
#       endpoint nuevo -- no crear operaciones sin ese bloque.

openapi: 3.0.3

info:
  title: "{{Nombre del dominio}} API"
  description: "{{Descripcion funcional del dominio}}"
  version: "{{MAJOR.MINOR.PATCH}}"
  contact:
    name: "{{TEAM-XXX}}"
  license:
    # OBLIGATORIO por regla Redocly "info-license". No eliminar este
    # bloque. Ajustar name/url segun la politica de licenciamiento
    # interna del banco para APIs no publicas.
    name: "PoC"
    url: "https://poc.com/licencia-apis-internas"

servers:
  - url: "{{https://api.banco.com/dominio}}"
    description: "{{Produccion / Sandbox}}"

security:
  - oauth2: []

paths: {}
  # Generado por el pipeline de build a partir de los MD del dominio.
  # No editar manualmente.
  #
  # ------------------------------------------------------------
  # EJEMPLO DE OPERACION (plantilla obligatoria a copiar)
  # ------------------------------------------------------------
  # /tu-recurso/{id}:
  #   get:
  #     summary: "{{Resumen de la operacion}}"
  #     operationId: "{{operationIdUnico}}"
  #     parameters:
  #       - name: id
  #         in: path
  #         required: true
  #         schema:
  #           type: string
  #     responses:
  #       '200':
  #         description: "{{Operacion exitosa}}"
  #         content:
  #           application/json:
  #             schema:
  #               $ref: "../message-definitions/{{TU-MD}}.fragment.yml"
  #       '400':
  #         $ref: "#/components/responses/BadRequest"
  #       '401':
  #         $ref: "#/components/responses/Unauthorized"
  #       '404':
  #         $ref: "#/components/responses/NotFound"
  #
  # Como minimo, toda operacion nueva DEBE incluir '400' (o el 4XX
  # que aplique) en "responses" -- nunca dejar una operacion solo
  # con '200'/'201'. Esto satisface la regla Redocly
  # "operation-4xx-response" automaticamente.

components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: "{{https://auth.banco.com/token}}"
          scopes: {}

  schemas: {}
    # Generado por el pipeline de build a partir de los BC/MC/DT/CS
    # individuales del dominio. Cada schema debe incluir:
    #
    # x-canonical-metadata:
    #   component_id: "BC-{{dominio}}-{{nombre}}-v{{MAJOR}}"
    #   source: "custom"          # custom | iso20022 | bian
    #   branch_id: null            # id de rama si es Fork

  responses:
    # Set minimo de respuestas 4XX reutilizables por todas las
    # operaciones del dominio. Toda operacion nueva debe referenciar
    # al menos una de estas (ver "EJEMPLO DE OPERACION" arriba).
    BadRequest:
      description: "Solicitud invalida"
    Unauthorized:
      description: "No autenticado"
    Forbidden:
      description: "No autorizado"
    NotFound:
      description: "Recurso no encontrado"
    InternalServerError:
      description: "Error interno del servidor"