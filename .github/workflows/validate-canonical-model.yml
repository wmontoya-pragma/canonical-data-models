name: Validar modelo canonico

on:
  pull_request:
    branches: [main]

jobs:
  validar-modelo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install pyyaml

      - name: Validar reglas de composicion y alineacion a estandar
        run: python3 scripts/validate_canonical_model.py --root .
